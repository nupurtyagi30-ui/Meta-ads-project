kind = "web"
previewPath = "/"
title = "Meta Ads Growth Lab"
version = "1.0.0"
id = "artifacts/lumina-growth-lab"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25770

[services.development]
run = "pnpm --filter @workspace/lumina-growth-lab run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lumina-growth-lab", "run", "build" ]
serve = "static"
publicDir = "artifacts/lumina-growth-lab/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25770"
BASE_PATH = "/"
